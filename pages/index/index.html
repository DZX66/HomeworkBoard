<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="index.css">
    <title id="title"></title>
</head>

<body>
    <div class="container hidden" id="container">
        <div class="left-panel">
            <div class="info-card">
                <h1 id="caption">课程作业展示板</h1>
            </div>
            <div class="info-card">
                <h3 id="time"></h3>
            </div>
        </div>
        <div class="right-panel info-card">
            <ol>
                <!-- 作业列表将在这里动态生成 -->
            </ol>
        </div>
        <div class="image-card info-card" id="image-card"></div>
    </div>
    <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-out">-</button>
        <span id="zoom-level">100%</span>
        <button class="zoom-btn" id="zoom-in">+</button>
    </div>
    <div id="status-bar">
        <div class="status-left">
            <div id="app-status" class="status-item">
                <span id="message"></span>
            </div>
        </div>
        <div class="status-right">
            <div class="status-item">
                <span id="version">v1.1.3</span>
            </div>
            <div id="clock" class="status-item"></div>
        </div>
    </div>
    <div id="history-window">
        <ul id="history-list"></ul>
    </div>
    <script src="render.js"></script>
</body>

</html>
